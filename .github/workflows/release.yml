name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build binaries
        run: |
          mkdir dist
          GOOS=linux   GOARCH=amd64 go build -o dist/imagegen-linux-amd64   .
          GOOS=linux   GOARCH=arm64 go build -o dist/imagegen-linux-arm64   .
          GOOS=darwin  GOARCH=amd64 go build -o dist/imagegen-darwin-amd64  .
          GOOS=darwin  GOARCH=arm64 go build -o dist/imagegen-darwin-arm64  .
          GOOS=windows GOARCH=amd64 go build -o dist/imagegen-windows-amd64.exe .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
